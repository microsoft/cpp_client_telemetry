name: Build for Android

on:
  push:
    branches:
    - master
    - main
    - dev
    - dev/*
    - release/*
    - buildme/*
    - maharrim/*

  pull_request:
    branches:
    - master
    - main
    - dev


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: windows-latest
    name: Build for Android
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: false
    - name: Update submodules
      run: |
        git submodule sync
        git config --global submodule.lib/modules.update none
        git -c protocol.version=2 submodule update --init --force --depth=1
    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'adopt'
        java-version: '17'
    - name: Remove default github maven configuration
      # Workaround for: 'Unable to decrypt local Maven settings credentials'
      run: rm $Env:USERPROFILE\.m2\settings.xml
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    - name: Install NDK
      run: |
        java -version
        gci env:* | sort-object name
        new-item "$Env:USERPROFILE\.android\repositories.cfg" -ItemType "file"
        echo yes | sdkmanager "ndk-bundle" "cmake;3.10.2.4988404" "ndk;27.0.12077973" --sdk_root=$Env:ANDROID_SDK_ROOT
    - name: Chocolatey
      run: |
        choco install --no-progress -y ninja
    - name: List CMake
      run: |
        pwd
        echo "=================="
        gci -r -i "CMake*" -Name
        echo "=================="
        gci -r -i "gtest-all*" -Name
        echo "=================="
        gci third_party/ -Name
        echo "=================="
        gci third_party/googletest -Name
    - name: Gradle Build
      run: |
        .\gradlew.bat maesdk:assemble app:assemble
      working-directory: lib\android_build
    - name: Java Unit test
      run: |
        .\gradlew.bat maesdk:test
      working-directory: lib\android_build
    - name: Upload Reports
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: reports
        path: lib\android_build\maesdk\build\reports

  build-soong:
    runs-on: ubuntu-latest
    name: Build via Soong
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: false
        path: vendor/microsoft/cpp_client_telemetry
    - name: Update submodules
      working-directory: vendor/microsoft/cpp_client_telemetry
      run: |
        git submodule sync
        git config --global submodule.lib/modules.update none
        git -c protocol.version=2 submodule update --init --force --depth=1
    - name: Install build prerequisites
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential curl flex git \
          lib32z1-dev libc6-dev-i386 \
          libncurses5-dev libssl-dev libx11-dev \
          libxml2-utils unzip zip zlib1g-dev
    - name: Set up repo tool
      run: |
        mkdir -p ~/bin
        curl -o ~/bin/repo https://storage.googleapis.com/git-repo-downloads/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH
    - name: Cache AOSP build tools
      id: aosp-cache
      uses: actions/cache@v4
      with:
        path: aosp
        key: aosp-soong-android14-bazel-${{ runner.os }}
    - name: Sync minimal AOSP build tools
      if: steps.aosp-cache.outputs.cache-hit != 'true'
      run: |
        mkdir -p aosp
        cd aosp
        repo init \
          -u https://android.googlesource.com/platform/manifest \
          -b android-14.0.0_r1 \
          --depth=1 \
          --no-tags \
          --no-clone-bundle
        repo sync -j$(nproc) --current-branch --no-clone-bundle \
          build/soong \
          build/blueprint \
          build/make \
          prebuilts/bazel/common \
          prebuilts/build-tools \
          prebuilts/go/linux-x86 \
          prebuilts/clang/host/linux-x86
    - name: Place vendor module in AOSP tree
      run: |
        mkdir -p aosp/vendor/microsoft
        ln -sfn "$(pwd)/vendor/microsoft/cpp_client_telemetry" \
          aosp/vendor/microsoft/cpp_client_telemetry
    - name: Build libmaesdk via Soong
      run: |
        cd aosp
        source build/envsetup.sh
        lunch aosp_arm64-eng
        SOONG_ALLOW_MISSING_DEPENDENCIES=true \
          m libmaesdk -j$(nproc)
