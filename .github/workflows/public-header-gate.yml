name: Public header gate

on:
  push:
    branches:
    - master
    - main
    - dev
    - dev/*
    - release/*
    - buildme/*

  pull_request:
    branches:
    - master
    - main
    - dev

# Least-privilege GITHUB_TOKEN scope: this workflow only checks out source and
# compiles the public headers. Explicit block satisfies CodeQL rule
# actions/missing-workflow-permissions if Actions analysis is enabled.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  linux:
    name: Public headers (GCC/Clang)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install clang
      run: sudo apt-get update && sudo apt-get install -y clang
    - name: Compile each public header standalone under strict flags
      run: bash tests/headers/check_public_headers.sh

  windows:
    name: Public headers (MSVC)
    runs-on: windows-2022
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Compile each public header standalone under /W4 /WX
      shell: cmd
      run: tests\headers\check_public_headers.cmd
